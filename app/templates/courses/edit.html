{% extends "base.html" %}

{% block title %}
Edit Courses
{% endblock %}

{% block content %}

<h2>Edit Courses</h2>
<form method="POST">
<select name="department_id" class="form-select">

{% for department in departments %}

<option
value="{{ department.id }}"
{% if department.id == course.department_id %}selected{% endif %}>

{{ department.name }}

</option>

{% endfor %}

</select>


<div class="mb-3">
 <div class="col-md-6"> 
<label>Course Code</label>

<input
type="text"
name="code"
class="form-control"
value="{{ course.code }}"
required>
</div>  

 <div class="col-md-6"> 
<label>Course Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ course.name }}"
required>

</div>
</div>
<div class="mb-3">

<label>Duration</label>

<input
type="text"
name="duration"
class="form-control"
value="{{ course.duration }}"
required>

</div>
<div class="mb-3">

<label>Capacity</label>

<input
type="text"
name="capacity"
class="form-control"
value="{{ course.capacity }}"
required>

</div>
<button class="btn btn-success">

Update Course

</button>

<a href="{{ url_for('course.list_courses') }}"
class="btn btn-secondary">

Cancel

</a>

</form>
{% endblock %}
