{% extends "base.html" %}

{% block title %}
Upload {{ document_type }}
{% endblock %}

{% block content %}

<div class="container mt-4">

```
<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h4 class="mb-0">
                    Upload {{ document_type }}
                </h4>

            </div>

            <div class="card-body">

                <div class="alert alert-info">

                    <strong>Accepted file formats:</strong>

                    PDF, JPG, JPEG and PNG

                </div>

                <form
                    method="POST"
                    enctype="multipart/form-data">

                    <div class="mb-3">

                        <label class="form-label">

                            Document Type

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ document_type }}"
                            readonly>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Select File

                        </label>

                        <input
                            type="file"
                            name="document"
                            class="form-control"
                            accept=".pdf,.jpg,.jpeg,.png"
                            required>

                        <div class="form-text">

                            Maximum recommended size: 5 MB.

                        </div>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a
                            href="{{ url_for('document.list_documents') }}"
                            class="btn btn-secondary">

                            Back

                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Upload Document

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
