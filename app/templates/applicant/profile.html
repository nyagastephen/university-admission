{% extends "base.html" %}

{% block title %}Applicant Profile{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>Applicant Profile</h2>

<form method="POST">

<div class="row">

<div class="col-md-4">

<label>First Name</label>

<input
type="text"
name="first_name"
class="form-control"
value="{{ profile.first_name if profile else '' }}"
required>

</div>

<div class="col-md-4">

<label>Middle Name</label>

<input
type="text"
name="middle_name"
class="form-control"
value="{{ profile.middle_name if profile else '' }}">

</div>

<div class="col-md-4">

<label>Last Name</label>

<input
type="text"
name="last_name"
class="form-control"
value="{{ profile.last_name if profile else '' }}"
required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<label>Gender</label>

<select
name="gender"
class="form-select">

<option value="">Select</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

</select>

</div>

<div class="col-md-4">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ profile.phone if profile else '' }}">

</div>

<div class="col-md-4">

<label>Nationality</label>

<input
type="text"
name="nationality"
class="form-control"
value="{{ profile.nationality if profile else '' }}">

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<label>County</label>

<input
type="text"
name="county"
class="form-control"
value="{{ profile.county if profile else '' }}">

</div>

<div class="col-md-4">

<label>Town</label>

<input
type="text"
name="city"
class="form-control"
value="{{ profile.city if profile else '' }}">

</div>

<div class="col-md-4">

<label>Postal Address</label>

<input
type="text"
name="postal_address"
class="form-control"
value="{{ profile.postal_address if profile else '' }}">

</div>

</div>
<div class="row">   
    <div class="col-md-4"> 
        <label>Date of Birth</label> <input
    type="date"
    name="date_of_birth"
    class="form-control"
    value="{{ profile.date_of_birth if profile else '' }}"> </div>
    <div class="col-md-4"> 
        <label>National ID</label> <input
    type="text"
    name="national_id"
    class="form-control"
    value="{{ profile.national_id if profile else '' }}"> </div>
</div>
<br>

<button
class="btn btn-success">

Save Profile

</button>

<a
href="{{ url_for('applicant.dashboard') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
